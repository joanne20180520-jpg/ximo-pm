<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>璽墨 專案管理系統</title>
<style>
:root {
  --bg:#edeae4; --surface:#fff; --sf2:#f7f5f2; --border:#e2ddd8;
  --text:#1a1916; --t2:#6b6860; --t3:#9e9b96; --accent:#1a1916;
  --c1:#2d6a4f; --c2:#1a4a7a; --c3:#7a1a2e; --c4:#4a7a1a; --c5:#5a3a8a;
  --lw:210px; --rw:245px; --th:46px; --r:10px; --rs:6px;
  --shadow:0 2px 14px rgba(0,0,0,0.09);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'PingFang TC',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13px}

/* topbar */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--th);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;z-index:100}
.logo{font-size:16px;font-weight:700;letter-spacing:2px}

/* body */
#body{position:fixed;top:var(--th);left:0;right:0;bottom:0;display:flex;gap:8px;padding:8px}

/* toggle buttons */
.tog{position:fixed;top:50%;transform:translateY(-50%);width:20px;height:52px;background:var(--surface);border:1px solid var(--border);cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .15s;z-index:50}
.tog:hover{background:var(--sf2);color:var(--text)}
#tl{left:calc(8px + var(--lw));border-left:none;border-radius:0 6px 6px 0}
#tr{right:calc(8px + var(--rw));border-right:none;border-radius:6px 0 0 6px}

/* panels */
#lp{order:1;width:var(--lw);flex-shrink:0;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:width .25s,opacity .25s;z-index:40}
#lp.col{width:0;opacity:0;margin-right:-8px;pointer-events:none}
#cp{order:2;flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
#rp{order:3;width:var(--rw);flex-shrink:0;background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;transition:width .25s,opacity .25s;z-index:40}
#rp.col{width:0;opacity:0;margin-left:-8px;pointer-events:none}

/* A区 */
.ah{height:var(--th);padding:0 10px;display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;gap:5px}
.sl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px}
.sa{display:flex;gap:3px;margin-left:auto}
.badd{padding:3px 7px;border-radius:var(--rs);border:1px solid var(--border);background:var(--sf2);font-size:10px;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.badd:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.pl{overflow-y:auto;padding:5px;flex-shrink:0;max-height:46%}
.pi{margin-bottom:3px;border-radius:var(--rs);overflow:hidden}
.pr{display:flex;align-items:center;gap:6px;padding:7px 9px;cursor:pointer;color:#fff;font-size:12px;font-weight:500;user-select:none;border-radius:var(--rs)}
.pr .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.5);flex-shrink:0}
.pr .arr{margin-left:auto;font-size:9px;opacity:.8;transition:transform .2s}
.pr.open .arr{transform:rotate(90deg)}
.pr-pm{font-size:10px;opacity:0.9;margin-left:4px}
.pr-date{font-size:10px;opacity:0.8}
.sl2{display:none;margin:2px 0 3px 4px}
.sl2.open{display:block}
.si{padding:5px 9px 5px 12px;font-size:11px;color:var(--t2);font-weight:500;cursor:pointer;border-radius:var(--rs);display:flex;align-items:center;justify-content:space-between}
.si:hover{background:var(--sf2)}

/* B区 */
.bs{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;border-top:1px solid var(--border)}
.bh{padding:7px 10px 4px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ft{display:flex;gap:3px;overflow-x:auto;padding:0 7px 5px;flex-shrink:0}
.ftag{padding:2px 7px;border-radius:20px;font-size:10px;cursor:pointer;border:1px solid var(--border);white-space:nowrap;color:var(--t2);background:var(--sf2);transition:all .15s}
.tl2{flex:1;overflow-y:auto;padding:5px 7px}
.tgl{padding:6px 3px 4px;font-size:11px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:5px;border-bottom:1px solid var(--border);margin-bottom:5px}
.tgd{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tc{background:var(--sf2);border-radius:8px;padding:1px 5px;font-size:9px;color:var(--t3);font-weight:600}
.ti{padding:7px 9px;border-radius:var(--rs);cursor:pointer;margin-bottom:4px;background:var(--surface);border:1px solid var(--border);transition:border-color .1s}
.ti:hover{border-color:var(--t3)}
.ti.selected{border-color:var(--accent);background:rgba(26,25,22,0.05)}
.tit{display:flex;align-items:flex-start;justify-content:space-between;gap:5px}
.tn{font-size:12px;font-weight:600}
.tm{font-size:10px;color:var(--t3);margin-top:1px}
.tr2{text-align:right;flex-shrink:0}
.td2{font-size:11px;font-weight:600}
.tds{font-size:10px;color:#e05a00;font-weight:700}
.tpb{height:2px;background:var(--border);border-radius:1px;margin-top:5px;overflow:hidden}
.tpf{height:100%;border-radius:1px}

/* C tabs */
#tabs{background:var(--surface);border-radius:var(--r) var(--r) 0 0;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:2px;height:var(--th);flex-shrink:0;box-shadow:var(--shadow)}
.ntab{padding:5px 11px;border-radius:var(--rs);border:none;background:none;font-size:13px;cursor:pointer;color:var(--t2);transition:all .15s;white-space:nowrap}
.ntab:hover{background:var(--sf2)}
.ntab.active{background:var(--accent);color:#fff}

/* D content */
#content{flex:1;overflow-y:auto;background:var(--bg);border-radius:0 0 var(--r) var(--r);padding:10px}
.page{display:none}
.page.active{display:block}

/* E区 */
.eh{height:var(--th);padding:0 12px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.eh h3{font-size:12px;font-weight:700}
.dn{display:flex;align-items:center;gap:4px}
.dn button{border:none;background:none;cursor:pointer;color:var(--t2);padding:2px 4px;border-radius:4px;font-size:12px}
.dn button:hover{background:var(--sf2)}
.jl{flex:1;overflow-y:auto;padding:4px}
.ji{padding:9px;border-radius:var(--rs);margin-bottom:3px}
.ji:hover{background:var(--sf2)}
.jt{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.jn{font-size:12px;font-weight:600}
.jpt{font-size:10px;padding:1px 6px;border-radius:10px;color:#fff;font-weight:500}
.jtask{font-size:11px;color:var(--t2);margin-bottom:3px}
.jnote{font-size:10px;color:var(--t3);background:var(--sf2);padding:4px 7px;border-radius:4px;border-left:2px solid var(--border)}

/* D cards */
.dc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.dch{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.dch h3{font-size:13px;font-weight:600;flex:1}
.pb{font-size:11px;padding:2px 7px;border-radius:20px;font-weight:600}
.bsm{padding:3px 9px;border-radius:var(--rs);border:1px solid var(--border);background:var(--sf2);font-size:11px;cursor:pointer;color:var(--t2);white-space:nowrap}
.bsm:hover{border-color:var(--accent);color:var(--accent)}

/* Gantt */
.gc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden}
.gtb{padding:8px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.gtb h3{font-size:13px;font-weight:600;flex:1}
.gb{display:flex;overflow:hidden;border-bottom:1px solid var(--border)}
.gf{width:190px;flex-shrink:0;border-right:2px solid var(--border);background:var(--surface)}
.gfh{height:52px;background:var(--sf2);border-bottom:1px solid var(--border);display:flex;align-items:flex-end;padding:0 10px 6px}
.gfh span{font-size:10px;font-weight:600;color:var(--t3)}
.grl{height:44px;padding:6px 10px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;justify-content:center}
.grl:last-child{border-bottom:none}
.grn{font-size:12px;font-weight:500}
.grm{font-size:10px;color:var(--t3);margin-top:1px}
.gsw{flex:1;overflow-x:auto;overflow-y:hidden;min-width:0}
.gtc{display:inline-block}
.gmr{display:flex;height:26px;border-bottom:1px solid var(--border);background:var(--sf2)}
.gmc{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--t2);border-right:1px solid var(--border);flex-shrink:0}
.gdr{display:flex;height:26px;border-bottom:1px solid var(--border);background:var(--sf2);position:relative}
.gdc{display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t3);border-right:1px solid rgba(226,221,216,0.4);flex-shrink:0}
.gdc.tdc{background:rgba(220,50,50,0.07);color:#c0392b;font-weight:700}
.gtr{height:44px;border-bottom:1px solid var(--border);position:relative;cursor:pointer}
.gtr:last-child{border-bottom:none}
.gbar{position:absolute;height:20px;top:50%;transform:translateY(-50%);border-radius:4px;display:flex;align-items:center;padding:0 6px;font-size:10px;color:rgba(255,255,255,.95);white-space:nowrap;cursor:pointer}
.gbar:hover{opacity:.82}
.tline{position:absolute;top:0;bottom:0;width:2px;background:#e03030;z-index:5;pointer-events:none}
.tlineh{position:absolute;top:0;width:2px;height:52px;background:#e03030;z-index:5;pointer-events:none}
.gsb{padding:5px 14px 8px;display:flex;align-items:center;gap:7px;border-top:1px solid var(--border)}
.gsb button{width:22px;height:22px;border:1px solid var(--border);border-radius:var(--rs);background:var(--sf2);cursor:pointer;font-size:11px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.gsb button:hover{background:var(--accent);color:#fff}
.gsb input[type=range]{flex:1;height:4px;cursor:pointer;accent-color:var(--t3)}

/* gantt controls */
.gctl{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;padding:7px 12px;display:flex;align-items:center;gap:7px}
.gnb{width:26px;height:26px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t2);transition:all .15s}
.gnb:hover{background:var(--sf2)}
.tbtn{padding:4px 10px;border:1px solid var(--border);border-radius:var(--rs);background:var(--surface);cursor:pointer;font-size:11px;color:var(--t2);font-weight:500}
.tbtn:hover{background:var(--sf2)}
.drl{font-size:12px;font-weight:600;flex:1;text-align:center}
.vs{display:flex;border:1px solid var(--border);border-radius:var(--rs);overflow:hidden}
.vb{padding:4px 10px;border:none;background:var(--surface);cursor:pointer;font-size:11px;color:var(--t2);border-right:1px solid var(--border)}
.vb:last-child{border-right:none}
.vb.active{background:var(--accent);color:#fff}
.vb:hover:not(.active){background:var(--sf2)}

/* payment form */
.pfw{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}
.fg{margin-bottom:11px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--t2);margin-bottom:3px}
.fg input,.fg select,.fg textarea{width:100%;padding:6px 9px;border:1px solid var(--border);border-radius:var(--rs);font-size:12px;background:var(--sf2);color:var(--text);outline:none;font-family:inherit}
.fg input:focus,.fg select:focus{border-color:var(--accent);background:#fff}
.ntags{display:flex;gap:5px;flex-wrap:wrap}
.ntag{padding:3px 10px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:var(--sf2);color:var(--t2);transition:all .15s}
.ntag.on{background:#f5c518;border-color:#e0b000;color:#5a4200}
.bsub{width:100%;padding:9px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:6px}

/* popup */
.po{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:center;justify-content:center}
.po.open{display:flex}
.pp{background:var(--surface);border-radius:var(--r);width:520px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.ppw{width:820px}
.pph{padding:13px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.pph h3{font-size:14px;font-weight:700}
.ppc{border:none;background:none;cursor:pointer;font-size:16px;color:var(--t3);padding:3px;border-radius:4px}
.ppc:hover{background:var(--sf2)}
.ppb{padding:16px}
.ppb2{padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px 16px}
.ppf{padding:10px 16px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:7px}
.bcan{padding:6px 13px;border-radius:var(--rs);border:1px solid var(--border);background:var(--sf2);font-size:12px;cursor:pointer;color:var(--t2)}
.bpri{padding:6px 16px;border-radius:var(--rs);border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer}

/* 列印預覽 */
.print-preview{padding:20px;background:#fff;color:#1a1916;font-family:-apple-system,'PingFang TC',sans-serif;font-size:13px}
.print-header{display:flex;justify-content:space-between;margin-bottom:20px}
.print-title{font-size:24px;font-weight:700;text-align:center;margin:20px 0}
.print-table{width:100%;border-collapse:collapse;margin:15px 0}
.print-table th,.print-table td{border:1px solid #333;padding:10px;text-align:left;font-size:12px}
.print-table th{background:#f5f5f5;font-weight:600}
.print-signature{margin-top:30px;display:flex;justify-content:space-around}
.print-sig-item{text-align:center;min-width:120px}
.print-sig-line{border-bottom:1px solid #333;min-height:60px;margin-bottom:10px}

/* avatar */
.av{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.avl{background:#1a4a7a}

/* table */
.dt{width:100%;border-collapse:collapse}
.dt th{padding:7px 10px;font-size:10px;font-weight:600;color:var(--t3);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
.dt td{padding:7px 10px;font-size:11px;border-bottom:1px solid var(--border)}
.dt tr:last-child td{border-bottom:none}
.dt tr:hover td{background:var(--sf2)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

@media print {
  body { background: #fff; }
  #topbar, #tl, #tr, #lp, #rp, .ppf, .print-buttons { display: none !important; }
  #cp { position: static; width: 100%; height: auto; }
  #tabs { display: none; }
  #content { flex: none; overflow: visible; padding: 0; background: #fff; }
  .page { display: block !important; }
  .print-preview { padding: 40px; }
}
</style>
</head>
<body>

<div id="topbar"><div class="logo">璽墨</div></div>

<button class="tog" id="tl" onclick="toggleL()">◀</button>
<button class="tog" id="tr" onclick="toggleR()">▶</button>

<div id="body">

<!-- ══ 左側 AB ══ -->
<div id="lp">
  <div class="ah">
    <span class="sl">Projects</span>
  </div>
  <div class="pl" id="pl-projects">
    <div style="padding:12px;color:var(--t3);font-size:11px">載入中...</div>
  </div>
  <div class="bs">
    <div class="bh"><span class="sl">任務清單</span></div>
    <div class="ft" id="filter-tags">
      <span class="ftag" style="background:var(--accent);color:#fff" onclick="filterTasks(this,'')">全部</span>
    </div>
    <div class="tl2" id="task-list-body">
      <div style="padding:12px;color:var(--t3);font-size:11px">載入中...</div>
    </div>
  </div>
</div>

<!-- ══ 中間 CD ══ -->
<div id="cp">
  <div id="tabs">
    <button class="ntab active" onclick="sw(this,'pg-s')">時程管理</button>
    <button class="ntab" onclick="sw(this,'pg-b')">費用管理</button>
    <button class="ntab" onclick="sw(this,'pg-e')">支出明細</button>
    <button class="ntab" onclick="sw(this,'pg-p')">付款金費單</button>
    <button class="ntab" onclick="sw(this,'pg-d')">設計任務單</button>
  </div>
  <div id="content">

    <!-- 時程管理 -->
    <div id="pg-s" class="page active">
      <div class="gctl">
        <button class="tbtn" onclick="goToday()">今天</button>
        <button class="gnb" onclick="shiftV(-1)">◀</button>
        <button class="gnb" onclick="shiftV(1)">▶</button>
        <span class="drl" id="drl">5/1 — 7/31</span>
        <div class="vs">
          <button class="vb" onclick="setV('week',this)">週</button>
          <button class="vb active" onclick="setV('month',this)">月</button>
          <button class="vb" onclick="setV('quarter',this)">季</button>
        </div>
      </div>
      <div id="gantt-area">
        <div style="padding:20px;color:var(--t3);font-size:12px;text-align:center">載入中...</div>
      </div>
    </div>

    <!-- 費用管理 -->
    <div id="pg-b" class="page">
      <div id="budget-area"><div style="padding:20px;color:var(--t3);font-size:12px;text-align:center">載入中...</div></div>
    </div>

    <!-- 支出明細 -->
    <div id="pg-e" class="page">
      <div id="expense-area"><div style="padding:20px;color:var(--t3);font-size:12px;text-align:center">載入中...</div></div>
    </div>

    <!-- 付款金費單 -->
    <div id="pg-p" class="page">
      <div class="dc"><div class="dch"><h3>付款申請單</h3></div>
        <div class="pfw">
          <div>
            <div class="fg"><label>申請部門</label><input type="text" id="p-dept" value="璽墨"></div>
            <div class="fg"><label>申請日期</label><input type="date" id="p-date"></div>
            <div class="fg"><label>支付對象</label><input type="text" id="p-payee" placeholder="請輸入"></div>
            <div class="fg"><label>廠商名稱</label><input type="text" id="p-vendor" placeholder="請輸入"></div>
            <div class="fg"><label>支付性質</label><div class="ntags" id="p-nature">
              <span class="ntag" onclick="togNtag(this)">貨款</span>
              <span class="ntag" onclick="togNtag(this)">工程款</span>
              <span class="ntag" onclick="togNtag(this)">薪工資</span>
              <span class="ntag" onclick="togNtag(this)">交際</span>
              <span class="ntag" onclick="togNtag(this)">公用事業費用</span>
              <span class="ntag" onclick="togNtag(this)">稅捐</span>
            </div></div>
          </div>
          <div>
            <div class="fg"><label>支付方式</label><select id="p-method"><option>現金</option><option>匯款</option><option>支票</option></select></div>
            <div class="fg"><label>事由</label><input type="text" id="p-reason" placeholder="請輸入"></div>
            <div class="fg"><label>備註</label><input type="text" id="p-remark" placeholder="請輸入"></div>
            <div class="fg"><label>付款總金額</label><input type="text" id="p-total" placeholder="請輸入"></div>
            <button class="bsub" onclick="previewPayment()">確認資料預覽</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 設計任務單 -->
    <div id="pg-d" class="page">
      <div class="dc"><div class="dch"><h3>設計任務單</h3></div>
        <table class="dt">
          <thead><tr><th>項目</th><th>狀態</th><th>設計師</th><th>初稿</th><th>完稿</th><th>成品</th></tr></thead>
          <tbody id="designs-body"><tr><td colspan="6" style="text-align:center;color:var(--t3)">載入中...</td></tr></tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- ══ 右側 E ══ -->
<div id="rp">
  <div class="eh"><h3>日誌</h3></div>
  <div class="jl" id="journal-list">
    <div style="padding:12px;color:var(--t3);font-size:11px">選擇任務新增日誌</div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// 工具函數
// ══════════════════════════════════════════

function parseDate(str) {
  if (!str) return null;
  if (typeof str === 'number') return new Date(str);
  var p = str.split('-');
  if (p.length === 3) {
    return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2]));
  }
  return new Date(str);
}

function toYMD(d) {
  if (!d) return '';
  return d.getFullYear() + '-'
    + String(d.getMonth() + 1).padStart(2, '0') + '-'
    + String(d.getDate()).padStart(2, '0');
}

function fmt(ts) {
  if (!ts) return '';
  var d = (typeof ts === 'number') ? new Date(ts) : parseDate(ts);
  return d.getFullYear() + '/' + (d.getMonth() + 1) + '/' + d.getDate();
}

function fmt2(d) {
  return (d.getMonth() + 1) + '/' + d.getDate();
}

function dif(a, b) {
  return Math.round((b - a) / 86400000);
}

function ntf(n) { return 'NT$' + Math.round(n).toLocaleString(); }

// ══════════════════════════════════════════
// 基本 UI 互動
// ══════════════════════════════════════════
var lc = false, rc = false;
var currentSelectedTask = null;
var TODAY = new Date(2026, 5, 12);

function toggleL() {
  lc = !lc;
  document.getElementById('lp').classList.toggle('col', lc);
  var btn = document.getElementById('tl');
  btn.textContent = lc ? '▶' : '◀';
  btn.style.left = lc ? '0' : 'calc(8px + var(--lw))';
}

function toggleR() {
  rc = !rc;
  document.getElementById('rp').classList.toggle('col', rc);
  var btn = document.getElementById('tr');
  btn.textContent = rc ? '◀' : '▶';
  btn.style.right = rc ? '0' : 'calc(8px + var(--rw))';
}

function sw(btn, id) {
  document.querySelectorAll('.ntab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  btn.classList.add('active');
  document.getElementById(id).classList.add('active');
}

function op(id) { document.getElementById(id).classList.add('open'); }
function cl(id) { document.getElementById(id).classList.remove('open'); }

document.querySelectorAll('.po').forEach(function(o) {
  o.addEventListener('click', function(e) { if (e.target === o) o.classList.remove('open'); });
});

function togNtag(el) { el.classList.toggle('on'); }

// ══════════════════════════════════════════
// API 資料載入
// ══════════════════════════════════════════
var API = '/api/lark';
var projectsData = [];
var workitemsData = [];
var tasksData = [];
var expensesData = [];
var designsData = [];

function loadData() {
  document.getElementById('pl-projects').innerHTML = '<div style="padding:12px;color:var(--t3);font-size:11px">載入中...</div>';
  document.getElementById('task-list-body').innerHTML = '<div style="padding:12px;color:var(--t3);font-size:11px">載入中...</div>';

  Promise.all([
    fetch(API + '?table=projects').then(function(r) { return r.json(); }),
    fetch(API + '?table=workitems').then(function(r) { return r.json(); }),
    fetch(API + '?table=tasks').then(function(r) { return r.json(); }),
    fetch(API + '?table=expenses').then(function(r) { return r.json(); }),
    fetch(API + '?table=designs').then(function(r) { return r.json(); })
  ]).then(function(results) {
    projectsData  = results[0].records || [];
    workitemsData = results[1].records || [];
    tasksData     = results[2].records || [];
    expensesData  = results[3].records || [];
    designsData   = results[4].records || [];
    renderProjects();
    renderTasks();
    renderBudget();
    renderExpenses();
    renderDesigns();
    setTodayDate();
  }).catch(function(err) {
    console.error('載入失敗', err);
    document.getElementById('pl-projects').innerHTML = '<div style="padding:12px;color:#c0392b;font-size:11px">載入失敗：' + err.message + '</div>';
  });
}

// ══════════════════════════════════════════
// 渲染 A 區：標案列表
// ══════════════════════════════════════════
function renderProjects() {
  var html = '';
  var PROJECT_COLORS = ['#2d6a4f', '#1a4a7a', '#7a1a2e', '#4a7a1a', '#5a3a8a'];
  
  projectsData.forEach(function(rec, i) {
    var f = rec.fields;
    var name  = f['標案名稱'] || '未命名';
    var pm    = (f['主PM'] && f['主PM'][0]) ? f['主PM'][0].name : '待指派';
    var startRaw = f['合約開始日'];
    var endRaw   = f['合約結束日'];
    var dateStr = '';
    if (startRaw && endRaw) {
      var s = parseDate(startRaw);
      var e = parseDate(endRaw);
      dateStr = fmt(s) + ' ~ ' + fmt(e);
    }
    var color = PROJECT_COLORS[i % PROJECT_COLORS.length];
    var progress = Math.round((f['標案完成%'] || 0) * 100);

    html += '<div class="pi">'
      + '<div class="pr" style="background:' + color + '">'
      + '<div class="dot"></div>'
      + '<span>' + name + '</span>'
      + '<span class="pr-pm">' + pm + '</span>'
      + '<span class="pr-date">' + dateStr + '</span>'
      + '</div>'
      + '</div>';
  });
  document.getElementById('pl-projects').innerHTML = html;
}

// ══════════════════════════════════════════
// 渲染 B 區：任務清單
// ══════════════════════════════════════════
function renderTasks() {
  var wiMap = {};
  workitemsData.forEach(function(wi) {
    var f = wi.fields;
    var projName = (f['所屬標案'] && f['所屬標案'].text_arr && f['所屬標案'].text_arr.length > 0)
      ? f['所屬標案'].text_arr[0] : '';
    wiMap[wi.record_id] = { name: f['工作項目名稱'] || '', project: projName };
  });

  var grouped = {};
  tasksData.forEach(function(rec) {
    var f        = rec.fields;
    var taskName = f['任務名稱'] || '未命名';
    var assignee = (f['負責人'] && f['負責人'][0]) ? f['負責人'][0].name : '';
    var dueRaw   = f['預計完成日'];
    var dueDate  = dueRaw ? fmt(dueRaw) : '';
    var progress = f['進度數值'] || 0;
    var wiArr    = f['所屬工作項目'];
    var wiName = '', projName = '其他';

    if (wiArr && wiArr.record_ids && wiArr.record_ids[0]) {
      var wi = wiMap[wiArr.record_ids[0]];
      if (wi) { wiName = wi.name; projName = wi.project || '其他'; }
    }

    if (!grouped[projName]) grouped[projName] = [];
    grouped[projName].push({ name: taskName, assignee: assignee, due: dueDate, dueRaw: dueRaw, progress: progress, wiName: wiName, id: rec.record_id });
  });

  Object.keys(grouped).forEach(function(proj) {
    grouped[proj].sort(function(a, b) { return (a.dueRaw || 0) - (b.dueRaw || 0); });
  });

  var PROJECT_COLORS = ['#2d6a4f', '#1a4a7a', '#7a1a2e', '#4a7a1a', '#5a3a8a'];
  var projColors = {};
  projectsData.forEach(function(rec, i) {
    projColors[rec.fields['標案名稱'] || ''] = PROJECT_COLORS[i % PROJECT_COLORS.length];
  });

  var html = '';
  projectsData.forEach(function(rec) {
    var pname = rec.fields['標案名稱'] || '';
    if (!grouped[pname] || grouped[pname].length === 0) return;
    var color = projColors[pname] || '#888';
    html += '<div class="tgl" data-proj="' + pname + '"><div class="tgd" style="background:' + color + '"></div>'
      + pname + '<span class="tc">' + grouped[pname].length + '</span></div>';
    grouped[pname].forEach(function(task) {
      var remaining = '';
      if (task.dueRaw) {
        var due = parseDate(task.dueRaw);
        var days = dif(TODAY, due);
        remaining = days + 'D';
        if (days < 0) remaining = '<span style="color:#c0392b">逾期</span>';
      }
      html += '<div class="ti" onclick="selectTaskFromList(this, \'' + task.id + '\')">'
        + '<div class="tit"><div><div class="tn">' + task.name + '</div>'
        + '<div class="tm">' + task.wiName + ' · ' + task.assignee + '</div></div>'
        + '<div class="tr2"><div class="td2">' + task.due + '</div><div class="tds">' + remaining + '</div></div></div>'
        + '<div class="tpb"><div class="tpf" style="width:' + task.progress + '%;background:' + color + '"></div></div>'
        + '</div>';
    });
  });

  document.getElementById('task-list-body').innerHTML = html;
  updateFilterTags(projColors);
}

function updateFilterTags(projColors) {
  var ft = document.getElementById('filter-tags');
  var html = '<span class="ftag" style="background:var(--accent);color:#fff" onclick="filterTasks(this,\'\')">全部</span>';
  projectsData.forEach(function(rec) {
    var pname = rec.fields['標案名稱'] || '';
    var color = projColors[pname] || '#888';
    html += '<span class="ftag" onclick="filterTasks(this,\'' + pname + '\')" data-proj="' + pname
      + '" style="border-color:' + color + ';color:' + color + '">' + pname + '</span>';
  });
  ft.innerHTML = html;
}

function filterTasks(el, proj) {
  document.querySelectorAll('.ftag').forEach(function(t) {
    if (t.dataset.proj) { t.style.background = ''; t.style.color = t.style.borderColor || ''; }
    else { t.style.background = ''; t.style.color = ''; }
  });
  el.style.background = el.style.borderColor || 'var(--accent)';
  el.style.color = '#fff';

  if (!proj) {
    document.querySelectorAll('#task-list-body > *').forEach(function(el) { el.style.display = ''; });
    return;
  }
  var show = false;
  document.querySelectorAll('#task-list-body > *').forEach(function(el) {
    if (el.classList.contains('tgl')) { show = el.dataset.proj === proj; }
    el.style.display = show ? '' : 'none';
  });
}

// ══════════════════════════════════════════
// 任務選擇和日誌
// ══════════════════════════════════════════
function selectTaskFromList(el, taskId) {
  document.querySelectorAll('.ti').forEach(function(t) { t.classList.remove('selected'); });
  el.classList.add('selected');
  showTaskDetail(taskId);
}

function showTaskDetail(taskId) {
  var task = tasksData.find(function(t) { return t.record_id === taskId; });
  if (!task) return;
  
  currentSelectedTask = task;
  var f = task.fields;
  var taskName = f['任務名稱'] || '未命名';
  var wiId = (f['所屬工作項目'] && f['所屬工作項目'].record_ids) ? f['所屬工作項目'].record_ids[0] : null;
  var wi = wiId ? workitemsData.find(function(w) { return w.record_id === wiId; }) : null;
  var wiName = wi ? (wi.fields['工作項目名稱'] || '') : '—';
  var assignee = (f['負責人'] && f['負責人'][0]) ? f['負責人'][0].name : '—';
  var dueRaw = f['預計完成日'];
  var due = dueRaw ? fmt(dueRaw) : '—';
  var progress = (f['進度數值'] || 0) + '%';

  document.getElementById('modal-task-name').textContent = taskName;
  document.getElementById('modal-workitem').textContent = wiName;
  document.getElementById('modal-assignee').textContent = assignee;
  document.getElementById('modal-due').textContent = due;
  document.getElementById('modal-progress').textContent = progress;
  document.getElementById('journal-content').value = '';
  
  op('pp-task');
}

function addJournal() {
  if (!currentSelectedTask) return;
  var content = document.getElementById('journal-content').value.trim();
  if (!content) {
    alert('請輸入日誌內容');
    return;
  }
  
  var f = currentSelectedTask.fields;
  var taskName = f['任務名稱'] || '未命名';
  var assignee = (f['負責人'] && f['負責人'][0]) ? f['負責人'][0].name : 'Unknown';
  var wiId = (f['所屬工作項目'] && f['所屬工作項目'].record_ids) ? f['所屬工作項目'].record_ids[0] : null;
  var wi = wiId ? workitemsData.find(function(w) { return w.record_id === wiId; }) : null;
  var wiName = wi ? (wi.fields['工作項目名稱'] || '') : 'Unknown';
  
  var journalHTML = '<div class="ji">'
    + '<div class="jt">'
    + '<span class="av avl">L</span>'
    + '<span class="jn">' + assignee + '</span>'
    + '<span class="jpt" style="background:#2d6a4f">' + wiName + '</span>'
    + '</div>'
    + '<div class="jtask">' + taskName + '</div>'
    + '<div class="jnote">' + content + '</div>'
    + '</div>';
  
  var journalList = document.getElementById('journal-list');
  if (journalList.innerHTML.includes('選擇任務新增日誌')) {
    journalList.innerHTML = journalHTML;
  } else {
    journalList.innerHTML = journalHTML + journalList.innerHTML;
  }
  
  cl('pp-task');
}

// ══════════════════════════════════════════
// 費用管理
// ══════════════════════════════════════════
function renderBudget() {
  var area = document.getElementById('budget-area');
  if (!area) return;
  var html = '';
  var PROJECT_COLORS = ['#2d6a4f', '#1a4a7a', '#7a1a2e', '#4a7a1a', '#5a3a8a'];
  
  projectsData.forEach(function(rec, i) {
    var f       = rec.fields;
    var name    = f['標案名稱'] || '未命名';
    var color   = PROJECT_COLORS[i % PROJECT_COLORS.length];
    var contract = parseFloat(f['合約金額']) || 0;
    var spent   = f['已支出合計'] || 0;
    var remain  = f['剩餘預算'] || (contract - spent);
    var pct     = contract > 0 ? Math.min(100, Math.round(spent / contract * 100)) : 0;

    html += '<div class="dc"><div class="dch"><div class="pdot" style="background:' + color + '"></div>'
      + '<h3>' + name + '</h3></div>'
      + '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 14px;border-bottom:1px solid var(--border)">'
      + '<div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">合約金額</div><div style="font-size:12px;font-weight:600">' + ntf(contract) + '</div></div>'
      + '<div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">已支出</div><div style="font-size:12px;font-weight:600">' + ntf(spent) + '</div></div>'
      + '<div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">剩餘</div><div style="font-size:12px;font-weight:600">' + ntf(remain) + '</div></div>'
      + '<div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">進度</div><div style="font-size:12px;font-weight:600">' + pct + '%</div></div>'
      + '<div><div style="font-size:10px;color:var(--t3);margin-bottom:2px">狀態</div><div style="font-size:12px;font-weight:600;color:' + (pct >= 80 ? '#c0392b' : '#2d6a4f') + '">' + (pct >= 100 ? '超預算' : '進行中') + '</div></div>'
      + '</div>'
      + '</div>';
  });
  document.getElementById('budget-area').innerHTML = html;
}

function renderExpenses() {
  var area = document.getElementById('expense-area');
  if (!area) return;
  var html = '<table class="dt"><thead><tr><th>項目</th><th>金額</th><th>日期</th><th>負責人</th></tr></thead><tbody>';
  expensesData.forEach(function(rec) {
    var f = rec.fields;
    var item = f['支出細項'] || '—';
    var amt  = f['實際金額'] || 0;
    var date = f['日期'] ? fmt(f['日期']) : '—';
    var person = (f['負責人'] && f['負責人'][0]) ? f['負責人'][0].name : '—';
    html += '<tr><td>' + item + '</td><td>' + ntf(amt) + '</td><td>' + date + '</td><td>' + person + '</td></tr>';
  });
  html += '</tbody></table>';
  document.getElementById('expense-area').innerHTML = html;
}

function renderDesigns() {
  var area = document.getElementById('designs-body');
  if (!area) return;
  var html = '';
  designsData.forEach(function(rec) {
    var f = rec.fields;
    var name = f['設計項目名稱'] || '—';
    var status = f['狀態'] ? (f['狀態'][0] || '—') : '—';
    var designer = (f['設計師'] && f['設計師'][0]) ? f['設計師'][0].name : '—';
    var draft = f['初稿交付日'] ? fmt(f['初稿交付日']) : '—';
    var final = f['完稿交付日'] ? fmt(f['完稿交付日']) : '—';
    var deliver = f['成品交付日'] ? fmt(f['成品交付日']) : '—';
    html += '<tr><td>' + name + '</td><td>' + status + '</td><td>' + designer + '</td><td>' + draft + '</td><td>' + final + '</td><td>' + deliver + '</td></tr>';
  });
  document.getElementById('designs-body').innerHTML = html || '<tr><td colspan="6" style="text-align:center;color:var(--t3)">暫無資料</td></tr>';
}

// ══════════════════════════════════════════

    + '<tr><td style="border:1px solid #333;padding:8px;background:#f5f5f5;font-weight:600">支付方式</td><td style="border:1px solid #333;padding:8px">' + method + '</td>'
    + '<td style="border:1px solid #333;padding:8px;background:#f5f5f5;font-weight:600">事由</td><td style="border:1px solid #333;padding:8px">' + reason + '</td></tr>'
    + '<tr><td style="border:1px solid #333;padding:8px;background:#f5f5f5;font-weight:600">備註</td><td colspan="3" style="border:1px solid #333;padding:8px">' + remark + '</td></tr>'
    + '<tr><td style="border:1px solid #333;padding:8px;background:#f5f5f5;font-weight:600">付款總金額</td>'
    + '<td colspan="3" style="border:1px solid #333;padding:8px;font-size:12px">' + amtH + '</td></tr>'
    + '</table>'
    + '<table style="width:100%;border-collapse:collapse;margin-bottom:20px">'
    + '<tr><td style="border:1px solid #333;padding:15px;text-align:center">董事長室：<br><br><br></td>'
    + '<td style="border:1px solid #333;padding:15px;text-align:center">主管：<br><br><br></td>'
    + '<td style="border:1px solid #333;padding:15px;text-align:center">申請人：<br><br><br></td></tr>'
    + '</table>'
    + '<div style="font-size:11px;color:#666;text-align:right">版本：01-2020-12</div>'
    + '</div>';
  
  document.getElementById('payment-preview-body').innerHTML = html;
  op('pp-payment-preview');
}

function sendPaymentNotification() {
  var dept = document.getElementById('p-dept').value || '璽墨';
  var payee = document.getElementById('p-payee').value || '—';
  var vendor = document.getElementById('p-vendor').value || '—';
  var reason = document.getElementById('p-reason').value || '—';
  var total = document.getElementById('p-total').value || '0';
  
  var message = '付款申請單已提交\n申請部門：' + dept + '\n支付對象：' + payee + '\n廠商名稱：' + vendor + '\n事由：' + reason + '\n金額：' + total;
  
  fetch('/api/lark?table=payments&action=create', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      fields: {
        '申請部門': dept,
        '申請日期': document.getElementById('p-date').value,
        '支付對象': payee,
        '廠商名稱': vendor,
        '支付方式': document.getElementById('p-method').value,
        '事由': reason,
        '備註': document.getElementById('p-remark').value,
        '付款總金額': parseFloat(total.replace(/[^0-9]/g, '')) || 0
      }
    })
  }).then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        alert('付款申請單已提交並發送通知');
        document.getElementById('p-payee').value = '';
        document.getElementById('p-vendor').value = '';
        document.getElementById('p-reason').value = '';
        document.getElementById('p-remark').value = '';
        document.getElementById('p-total').value = '';
        document.querySelectorAll('#p-nature .ntag').forEach(function(t) { t.classList.remove('on'); });
        cl('pp-payment-preview');
      } else {
        alert('提交失敗：' + (data.error || 'Unknown error'));
      }
    })
    .catch(function(err) {
      alert('提交失敗：' + err.message);
    });
}
